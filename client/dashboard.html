<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bug Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container dashboard-container">
    <div class="header-bar">
      <h2>Bug Dashboard</h2>
      <button onclick="logout()" class="secondary" style="width: auto; padding: 10px 20px;">Logout</button>
    </div>

    <div id="triageBanner" class="triage-banner" style="display: none;"></div>

    <div class="input-group">
      <input id="title" placeholder="Bug Title / Description">
      <textarea id="codeSnippet" placeholder="Optional: Paste your code here to let the AI debug it..."></textarea>
      <select id="severity">
        <option value="" disabled selected>Select Severity</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
      <button onclick="createBug()">Add Bug</button>
    </div>

    <ul id="bugList"></ul>
  </div>

  <script src="js/config.js"></script>
  <script src="js/dashboard.js"></script>

</body>
</html>
